{% extends "admin/change_form.html" %}

{% block object-tools-items %}
  {% if original %}
    <li>
      <form method="post" action="{% url 'admin:whatsapp_wsnumber_register_phone' original.pk %}" style="display:inline">
        {% csrf_token %}
        <button type="submit" class="button">Register phone number</button>
      </form>
    </li>
    <li>
      <form method="post" action="{% url 'admin:whatsapp_wsnumber_setup_waba_webhook' original.pk %}" style="display:inline">
        {% csrf_token %}
        <button type="submit" class="button">Setup WABA &amp; webhook</button>
      </form>
    </li>
    <li>
      <form method="post" action="{% url 'admin:whatsapp_wsnumber_check_webhook_config' original.pk %}" style="display:inline">
        {% csrf_token %}
        <button type="submit" class="button">Check webhook config</button>
      </form>
    </li>
  {% endif %}
  {{ block.super }}
{% endblock %}
